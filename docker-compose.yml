services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-monirensheng}
      POSTGRES_USER: ${POSTGRES_USER:-monirensheng}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monirensheng}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monirensheng} -d ${POSTGRES_DB:-monirensheng}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      SAVE_REPOSITORY_TYPE: postgres
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-monirensheng}:${POSTGRES_PASSWORD:-monirensheng}@postgres:5432/${POSTGRES_DB:-monirensheng}
      AUTO_CREATE_TABLES: "true"
      ENABLE_DEV_ROUTES: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
